<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Expense Tracker</title>
<style>
  :root {
    --bg: #f4f5f7;
    --card: #ffffff;
    --text: #1f2430;
    --muted: #6b7280;
    --accent: #2563eb;
    --accent-soft: #dbeafe;
    --danger: #dc2626;
    --border: #e5e7eb;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 16px 64px;
  }
  h1 { font-size: 1.5rem; margin: 0 0 4px; }
  .subtitle { color: var(--muted); margin: 0 0 24px; font-size: 0.9rem; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
  }
  .card h2 { font-size: 1.05rem; margin: 0 0 14px; }
  form .row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .field { display: flex; flex-direction: column; flex: 1 1 140px; }
  label { font-size: 0.8rem; color: var(--muted); margin-bottom: 4px; }
  input, select, button {
    font: inherit;
    padding: 9px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fff;
    color: var(--text);
  }
  input:focus, select:focus { outline: 2px solid var(--accent-soft); border-color: var(--accent); }
  button.primary {
    background: var(--accent);
    color: #fff;
    border: none;
    cursor: pointer;
    padding: 10px 18px;
    font-weight: 600;
  }
  button.primary:hover { filter: brightness(1.08); }
  .month-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .month-bar input[type="month"] { padding: 7px 10px; }
  .total-line { font-size: 1.15rem; font-weight: 700; }
  .cat-row { margin-bottom: 10px; }
  .cat-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.88rem;
    margin-bottom: 3px;
  }
  .cat-label .amt { font-weight: 600; }
  .bar-bg {
    background: var(--bg);
    border-radius: 6px;
    height: 10px;
    overflow: hidden;
  }
  .bar-fill {
    background: var(--accent);
    height: 100%;
    border-radius: 6px;
    transition: width 0.25s ease;
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
  th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.04em; }
  td.amount { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  th.amount { text-align: right; }
  .del-btn {
    background: none;
    border: none;
    color: var(--danger);
    cursor: pointer;
    font-size: 0.85rem;
    padding: 4px 6px;
  }
  .del-btn:hover { text-decoration: underline; }
  .empty { color: var(--muted); text-align: center; padding: 18px 0; font-size: 0.9rem; }
  .toolbar { display: flex; gap: 10px; }
  .toolbar button {
    background: #fff;
    cursor: pointer;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .toolbar button:hover { color: var(--text); border-color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <h1>My Expense Tracker</h1>
  <p class="subtitle">Everything is saved privately in this browser — no account, no internet needed.</p>

  <!-- Add expense -->
  <div class="card">
    <h2>Add an expense</h2>
    <form id="expense-form">
      <div class="row">
        <div class="field">
          <label for="amount">Amount (&#8377;)</label>
          <input type="number" id="amount" min="0.01" step="0.01" placeholder="e.g. 250" required>
        </div>
        <div class="field">
          <label for="category">Category</label>
          <select id="category" required>
            <option value="Food">Food</option>
            <option value="Groceries">Groceries</option>
            <option value="Transport">Transport</option>
            <option value="Rent">Rent</option>
            <option value="Utilities">Utilities</option>
            <option value="Shopping">Shopping</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Health">Health</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="field">
          <label for="date">Date</label>
          <input type="date" id="date" required>
        </div>
      </div>
      <div class="row">
        <div class="field" style="flex: 2 1 240px;">
          <label for="note">Note (optional)</label>
          <input type="text" id="note" maxlength="80" placeholder="e.g. lunch with friends">
        </div>
        <div class="field" style="flex: 0 0 auto; justify-content: flex-end;">
          <button type="submit" class="primary">Add expense</button>
        </div>
      </div>
    </form>
  </div>

  <!-- Monthly summary -->
  <div class="card">
    <div class="month-bar">
      <h2 style="margin:0;">Monthly summary</h2>
      <input type="month" id="month-picker">
    </div>
    <div class="total-line" id="month-total"></div>
    <div id="category-breakdown" style="margin-top:14px;"></div>
  </div>

  <!-- Expense list -->
  <div class="card">
    <div class="month-bar">
      <h2 style="margin:0;">Expenses this month</h2>
      <div class="toolbar">
        <button type="button" id="export-btn" title="Download all expenses as a spreadsheet file">Export CSV</button>
      </div>
    </div>
    <div id="expense-list"></div>
  </div>
</div>

<script>
(function () {
  "use strict";

  var STORAGE_KEY = "expense-tracker-data-v1";
  var CURRENCY = "₹"; // Rupee symbol. Change to "$", "€", etc. if you like.

  // ---------- Data helpers ----------

  function loadExpenses() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      var data = raw ? JSON.parse(raw) : [];
      return Array.isArray(data) ? data : [];
    } catch (e) {
      return [];
    }
  }

  function saveExpenses(expenses) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(expenses));
  }

  function formatMoney(n) {
    return CURRENCY + n.toLocaleString("en-IN", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });
  }

  function formatDate(iso) {
    // "2026-07-18" -> "18 Jul"
    var d = new Date(iso + "T00:00:00");
    if (isNaN(d)) return iso;
    return d.toLocaleDateString("en-GB", { day: "numeric", month: "short" });
  }

  function todayISO() {
    var d = new Date();
    var m = String(d.getMonth() + 1).padStart(2, "0");
    var day = String(d.getDate()).padStart(2, "0");
    return d.getFullYear() + "-" + m + "-" + day;
  }

  // ---------- Elements ----------

  var form = document.getElementById("expense-form");
  var amountInput = document.getElementById("amount");
  var categoryInput = document.getElementById("category");
  var dateInput = document.getElementById("date");
  var noteInput = document.getElementById("note");
  var monthPicker = document.getElementById("month-picker");
  var monthTotalEl = document.getElementById("month-total");
  var breakdownEl = document.getElementById("category-breakdown");
  var listEl = document.getElementById("expense-list");
  var exportBtn = document.getElementById("export-btn");

  var expenses = loadExpenses();

  // Defaults: today's date, current month
  dateInput.value = todayISO();
  monthPicker.value = todayISO().slice(0, 7);

  // ---------- Rendering ----------

  function expensesForMonth(month) {
    return expenses.filter(function (e) {
      return e.date.slice(0, 7) === month;
    });
  }

  function render() {
    var month = monthPicker.value || todayISO().slice(0, 7);
    var monthExpenses = expensesForMonth(month);

    // Total
    var total = monthExpenses.reduce(function (sum, e) { return sum + e.amount; }, 0);
    monthTotalEl.textContent = "Total: " + formatMoney(total);

    // Category breakdown
    breakdownEl.innerHTML = "";
    if (monthExpenses.length === 0) {
      var emptyMsg = document.createElement("div");
      emptyMsg.className = "empty";
      emptyMsg.textContent = "No expenses recorded for this month yet.";
      breakdownEl.appendChild(emptyMsg);
    } else {
      var byCategory = {};
      monthExpenses.forEach(function (e) {
        byCategory[e.category] = (byCategory[e.category] || 0) + e.amount;
      });
      var cats = Object.keys(byCategory).sort(function (a, b) {
        return byCategory[b] - byCategory[a];
      });
      var max = byCategory[cats[0]];
      cats.forEach(function (cat) {
        var row = document.createElement("div");
        row.className = "cat-row";

        var label = document.createElement("div");
        label.className = "cat-label";
        var name = document.createElement("span");
        name.textContent = cat;
        var amt = document.createElement("span");
        amt.className = "amt";
        amt.textContent = formatMoney(byCategory[cat]);
        label.appendChild(name);
        label.appendChild(amt);

        var barBg = document.createElement("div");
        barBg.className = "bar-bg";
        var barFill = document.createElement("div");
        barFill.className = "bar-fill";
        barFill.style.width = Math.max(4, Math.round((byCategory[cat] / max) * 100)) + "%";
        barBg.appendChild(barFill);

        row.appendChild(label);
        row.appendChild(barBg);
        breakdownEl.appendChild(row);
      });
    }

    // Expense list (newest first)
    listEl.innerHTML = "";
    if (monthExpenses.length === 0) {
      var empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "Nothing here yet. Add your first expense above.";
      listEl.appendChild(empty);
      return;
    }

    var sorted = monthExpenses.slice().sort(function (a, b) {
      if (a.date !== b.date) return a.date < b.date ? 1 : -1;
      return b.id - a.id;
    });

    var table = document.createElement("table");
    var thead = document.createElement("thead");
    thead.innerHTML = "<tr><th>Date</th><th>Category</th><th>Note</th><th class='amount'>Amount</th><th></th></tr>";
    table.appendChild(thead);

    var tbody = document.createElement("tbody");
    sorted.forEach(function (e) {
      var tr = document.createElement("tr");

      var tdDate = document.createElement("td");
      tdDate.textContent = formatDate(e.date);

      var tdCat = document.createElement("td");
      tdCat.textContent = e.category;

      var tdNote = document.createElement("td");
      tdNote.textContent = e.note || "";
      tdNote.style.color = "var(--muted)";

      var tdAmt = document.createElement("td");
      tdAmt.className = "amount";
      tdAmt.textContent = formatMoney(e.amount);

      var tdDel = document.createElement("td");
      tdDel.style.textAlign = "right";
      var delBtn = document.createElement("button");
      delBtn.className = "del-btn";
      delBtn.textContent = "Delete";
      delBtn.addEventListener("click", function () {
        if (confirm("Delete this expense?")) {
          expenses = expenses.filter(function (x) { return x.id !== e.id; });
          saveExpenses(expenses);
          render();
        }
      });
      tdDel.appendChild(delBtn);

      tr.appendChild(tdDate);
      tr.appendChild(tdCat);
      tr.appendChild(tdNote);
      tr.appendChild(tdAmt);
      tr.appendChild(tdDel);
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    listEl.appendChild(table);
  }

  // ---------- Events ----------

  form.addEventListener("submit", function (ev) {
    ev.preventDefault();
    var amount = parseFloat(amountInput.value);
    if (!amount || amount <= 0) {
      alert("Please enter an amount greater than zero.");
      return;
    }
    expenses.push({
      id: Date.now(),
      amount: Math.round(amount * 100) / 100,
      category: categoryInput.value,
      date: dateInput.value,
      note: noteInput.value.trim()
    });
    saveExpenses(expenses);

    // Jump the summary to the month the expense was added to
    monthPicker.value = dateInput.value.slice(0, 7);

    // Reset amount/note but keep category and date for quick repeat entry
    amountInput.value = "";
    noteInput.value = "";
    amountInput.focus();
    render();
  });

  monthPicker.addEventListener("change", render);

  exportBtn.addEventListener("click", function () {
    if (expenses.length === 0) {
      alert("No expenses to export yet.");
      return;
    }
    var rows = [["Date", "Category", "Amount", "Note"]];
    expenses.slice().sort(function (a, b) {
      return a.date < b.date ? -1 : 1;
    }).forEach(function (e) {
      rows.push([e.date, e.category, e.amount.toFixed(2), (e.note || "").replace(/"/g, '""')]);
    });
    var csv = rows.map(function (r) {
      return r.map(function (cell) { return '"' + cell + '"'; }).join(",");
    }).join("\n");
    var blob = new Blob([csv], { type: "text/csv" });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "my-expenses.csv";
    a.click();
    URL.revokeObjectURL(a.href);
  });

  render();
})();
</script>
</body>
</html>
